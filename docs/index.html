<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Mining Techniques - Group 5</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #334155;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .container {
      max-width: 640px;
      width: 100%;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: rgba(59, 130, 246, 0.15);
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }

    .subtitle {
      color: var(--muted);
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    .info {
      text-align: left;
      margin-bottom: 2rem;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
    }

    .info-item:last-child { border-bottom: none; }
    .info-label { color: var(--muted); }
    .info-value { font-weight: 500; }

    .btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      padding: 0.85rem 2rem;
      border-radius: 10px;
      transition: background 0.2s;
      width: 100%;
    }

    .btn:hover { background: var(--accent-hover); }

    .footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <span class="badge">Group 5</span>
      <h1>Data Mining Techniques</h1>
      <p class="subtitle">Assignment 1</p>

      <div class="info">
        <div class="info-item">
          <span class="info-label">Course</span>
          <span class="info-value">Data Mining Techniques</span>
        </div>
        <div class="info-item">
          <span class="info-label">Assignment</span>
          <span class="info-value">1</span>
        </div>
        <div class="info-item">
          <span class="info-label">Repository</span>
          <span class="info-value">DMTGroup5</span>
        </div>
      </div>

      <a href="https://github.com/HiddeFranke/DMTGroup5" class="btn">
        Join on GitHub
      </a>
    </div>
    <p class="footer">VU Amsterdam - MSc Business Analytics</p>
  </div>
</body>
</html>
